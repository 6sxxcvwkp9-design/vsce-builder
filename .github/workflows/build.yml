name: Build VSCE Offline Bundle
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Using Supported LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # <--- UPDATED FROM 20 TO 22 (Safe & Supported)

      - name: Install VSCE and ALL Dependencies
        run: npm install @vscode/vsce@3.5.1-0

      - name: Upload COMPLETE Offline Bundle
        uses: actions/upload-artifact@v4
        with:
          name: vsce-complete-offline-bundle
          path: node_modules
          retention-days: 5
