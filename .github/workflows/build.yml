name: Build VSCE
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install VSCE
        run: npm install @vscode/vsce@3.5.1-0
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: vsce-full
          path: node_modules/@vscode/vsce
